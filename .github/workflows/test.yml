name: Test
on:
  push:
  pull_request:
jobs:
  setup-drp:
    name: Setup DRP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Setup DRP
        run: |
          curl -fsSL get.rebar.digital/stable | bash -s -- install --isolated --version=stable
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: drp
          path: |
            bin/**/*
            assets
            drp-data
            tools
  acceptance:
    name: Acc Test for Terraform ${{ matrix.tf_version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tf_version: ["1.7", "1.8", "1.9", "1.10", "1.11", "1.12", "1.13", "1.14"]
      fail-fast: false
    needs: setup-drp
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: drp
      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Configure DRP
        run: |
          chmod +x $(pwd)/bin/linux/amd64/dr-provision
          ln -s $(pwd)/bin/linux/amd64/dr-provision /usr/local/bin/dr-provision
          dr-provision --version
      - uses: hashicorp/setup-terraform@633666f66e0061ca3b725c73b2ec20cd13a8fdd1 # v4.0.0
        with:
          terraform_version: ~${{ matrix.tf_version }}
          terraform_wrapper: false
      - name: Run tests
        env:
          TF_ACC: 1
          TF_ACC_LOG: trace
          LOG_LEVEL: debug
          RS_ENDPOINT: https://127.0.0.1:8092
          RS_KEY: rocketskates:r0cketsk8ts
          RS_DISABLE_DNS: true
        run: |
          go test -v ./drpv4 -cover -timeout 30m -count 1
